name: Déploiement du site (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Install Typst
        uses: typst-community/setup-typst@v4
        with:
          typst-version: latest

      - name: Compiler les sources du kit (kit-sources/*.typ -> docs/kit/*.pdf)
        run: |
          mkdir -p docs/kit
          shopt -s nullglob
          for src in kit-sources/*.typ; do
            base=$(basename "$src" .typ)
            typst compile \
              --font-path projet-typst/fonts \
              "$src" "docs/kit/$base.pdf"
            echo "✓ docs/kit/$base.pdf ($(du -h "docs/kit/$base.pdf" | cut -f1))"
          done

      - name: Compiler l'exemple (projet-typst/main.typ -> docs/kit/exemple_ions.pdf)
        run: |
          typst compile \
            --font-path projet-typst/fonts \
            projet-typst/main.typ \
            docs/kit/exemple_ions.pdf
          echo "✓ docs/kit/exemple_ions.pdf ($(du -h docs/kit/exemple_ions.pdf | cut -f1))"

      - name: Zipper le projet pour les participants (projet-typst/ -> docs/kit/projet-typst.zip)
        run: |
          rm -f docs/kit/projet-typst.zip
          zip -rq docs/kit/projet-typst.zip projet-typst -x '*.DS_Store'
          unzip -l docs/kit/projet-typst.zip

      - name: Construire le site MkDocs
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
